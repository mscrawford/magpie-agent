name: validate-consistency

# Sync guard for the magpie-agent documentation.
#
# Two guarantees, deliberately separated:
#   * GUARD HEALTH (always blocking): selftest_validator.sh must pass and the
#     validator must never ABORT (exit 99). This is the iron guarantee that the
#     guard is alive and capable of detecting defects — the property whose
#     absence let a dead validator be reported as "clean" for ~7 months.
#   * DOC DRIFT (advisory by default): validate_consistency.sh exit 1 (docs
#     disagree with the GAMS code at the pinned sync commit) is surfaced as a
#     warning annotation. Set the repo variable VALIDATOR_STRICT=true to make
#     drift block merges once the existing citation backlog is triaged.
#
# The validator needs the parent MAgPIE model tree to produce a meaningful
# result, so this job reconstructs the deployed layout (magpie/magpie-agent)
# with the model checked out at the commit recorded in project/sync_log.json.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: validate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout magpie-agent
        uses: actions/checkout@v4
        with:
          path: magpie-agent-src

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Read pinned magpie commit from sync_log.json
        id: pin
        run: |
          sha=$(python3 -c "import json,sys; print(json.load(open('magpie-agent-src/project/sync_log.json'))['sync_status']['last_sync_commit'])")
          if [ -z "$sha" ]; then echo "::error::no last_sync_commit in sync_log.json"; exit 1; fi
          echo "sha=$sha" >> "$GITHUB_OUTPUT"
          echo "Pinned magpie commit: $sha"

      - name: Clone MAgPIE model at pinned commit
        env:
          PIN_SHA: ${{ steps.pin.outputs.sha }}
        run: |
          git clone --filter=blob:none https://github.com/magpiemodel/magpie.git magpie
          # The pin is a develop commit, and the public mirror can briefly lag it.
          # If the exact pin isn't reachable yet, fall back to the develop tip (loud
          # warning) so the guard-health self-test + validator still run instead of
          # the whole job dying at rig assembly. (Previously a hard `git checkout`
          # broke CI for days when the pin led the public mirror -- see BACKLOG.)
          if git -C magpie checkout "$PIN_SHA" 2>/dev/null; then
            echo "checked out pinned commit $PIN_SHA"
          elif git -C magpie checkout origin/develop 2>/dev/null; then
            echo "::warning::pinned commit $PIN_SHA not in public mirror yet; fell back to origin/develop tip"
          else
            echo "::warning::pinned commit $PIN_SHA and origin/develop unavailable; falling back to origin/HEAD"
            git -C magpie checkout origin/HEAD
          fi
          git -C magpie log -1 --format='checked out %h %ci %s'

      - name: Assemble deployed layout and deploy AGENT.md
        run: |
          mv magpie-agent-src magpie/magpie-agent
          cp magpie/magpie-agent/AGENT.md magpie/AGENT.md
          cp magpie/magpie-agent/AGENT.md magpie/CLAUDE.md

      - name: Guard health — validator self-test (always blocking)
        run: bash magpie/magpie-agent/scripts/selftest_validator.sh

      - name: Run consistency validator
        env:
          STRICT: ${{ vars.VALIDATOR_STRICT || 'false' }}
        run: |
          set +e
          bash magpie/magpie-agent/scripts/validate_consistency.sh
          rc=$?
          echo "validator exit code: $rc"
          if [ "$rc" -eq 99 ]; then
            echo "::error::Validator ABORTED (exit 99) before completion — the guard is broken, not the docs. Fix the abort cause."
            exit 1
          fi
          if [ "$rc" -eq 1 ]; then
            echo "::warning::Validator completed with doc-vs-code errors (exit 1). See the VALIDATOR_RESULT line above."
            if [ "$STRICT" = "true" ]; then
              echo "::error::VALIDATOR_STRICT=true — doc drift fails the build."
              exit 1
            fi
            exit 0
          fi
          if [ "$rc" -ne 0 ]; then
            echo "::error::Validator exited with unexpected code $rc."
            exit 1
          fi
          echo "Validator PASS (exit 0)."
